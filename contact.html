<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Contact Page</title>
  </head>
  <body>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/about.html">About</a>
      <a href="/services.html">Services Page</a>
      <a href="/team.html">Team Page</a>
      <a href="contact.html" aria-current="page">Contact</a>
    </nav>
    <main>
      <h1>Contact</h1>
      <form>
        <fieldset>
          <legend>Contact Form</legend>
          <label for="name">Name:*</label>
          <input type="text" id="name" required />
          <br />
          <br />
          <label for="email">Email:*</label>
          <input type="email" id="email" required />
          <br />
          <br />
          <label for="phone">Phone:</label>
          <input type="tel" />
          <br /><br />
          <label for="department">Department:*</label>
          <input list="departmentList" id="department" required />
          <datalist id="departmentList">
            <option value="Desgin"></option>
            <option value="Developer"></option>
            <option value="QA"></option>
          </datalist>
          <br />
          <br />
          <label for="message">Message:*</label>
          <textarea id="message" required></textarea>
          <br />
          <br />
          <input type="checkbox" id="newsLetter" />
          <label for="newsLetter">Send news letter</label>
        </fieldset>
        <input type="submit" />
      </form>
      <div>
        <h2>Location</h2>
        <iframe
          title="Location of Company"
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3907.476957585935!2d76.23974257505509!3d11.66057178854709!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ba6097295a1d8ad%3A0xb302b72edc08e0db!2sVonnue%20Innovations%20Pvt.%20Ltd.!5e0!3m2!1sen!2sin!4v1780989264902!5m2!1sen!2sin"
          width="600"
          height="450"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
        <address>
          2nd Floor Key Tee Tower, Sultan Bathery, Kerala, India-673592
        </address>
      </div>
    </main>
    <footer>
      <p>© 2024 Essentials</p>
    </footer>
  </body>
</html>
